<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game Center</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#f3e8ff,#e9d5ff,#ddd6fe);
    color:#5b3c88;
    text-align:center;
}

h1{
    margin-top:50px;
    font-size:50px;
}

.menu{
    margin-top:80px;
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}

.game-btn{
    width:200px;
    padding:25px;
    font-size:22px;
    border:none;
    border-radius:15px;
    background:#c4b5fd;
    color:#4c1d95;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.game-btn:hover{
    transform:scale(1.08);
    background:#a78bfa;
}
</style>

</head>
<body>

<h1>🎮 GAME CENTER</h1>

<div class="menu">

<button class="game-btn" onclick="location.href='Game phá gạch/index.html'">Game 1</button>

<button class="game-btn" onclick="location.href='game/index.html'">Game 2</button>

<button class="game-btn" onclick="location.href='game chim nhay/ImageGame/index.html'">Game 3</button>

<button class="game-btn" onclick="location.href='Game 2/index.html'">Game 4</button>

</div>

</body>
</html>
